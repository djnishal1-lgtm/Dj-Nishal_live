<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>DJ Nishal 🔥 Live Feed</title>

<style>

/* BACKGROUND */
body {
  margin: 0;
  background: radial-gradient(circle at center, #111, #000);
  color: white;
  font-family: Arial;
  overflow-x: hidden;
}

/* HEADER */
.header {
  text-align: center;
  padding: 30px;
}

.title {
  font-size: 40px;
  color: gold;
  text-shadow: 0 0 20px orange;
}

/* VINYL */
.vinyl-container {
  display: flex;
  justify-content: center;
  margin-top: 20px;
}

.vinyl {
  width: 180px;
  height: 180px;
  border-radius: 50%;
  background: radial-gradient(circle, #222 20%, black 60%);
  border: 5px solid #333;
  animation: spin 6s linear infinite;
  position: relative;
}

/* CENTER LABEL */
.vinyl::after {
  content: "DJ";
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  background: gold;
  color: black;
  width: 60px;
  height: 60px;
  border-radius: 50%;
  display: flex;
  justify-content: center;
  align-items: center;
  font-weight: bold;
}

/* SPIN ANIMATION */
@keyframes spin {
  from { transform: rotate(0deg); }
  to { transform: rotate(360deg); }
}

/* TRACK CARDS */
.feed {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
  gap: 20px;
  padding: 30px;
}

.track {
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
  padding: 10px;
  backdrop-filter: blur(10px);
  transition: 0.3s;
}

.track:hover {
  transform: scale(1.03);
  box-shadow: 0 0 20px orange;
}

h3 {
  font-size: 14px;
}

iframe {
  border-radius: 10px;
}

/* GLOW TEXT */
.glow {
  color: #fff;
  text-shadow: 0 0 10px #ff8c00, 0 0 20px #ff4500;
}

</style>
</head>

<body>

<div class="header">
  <div class="title">🔥 DJ NISHAL LIVE REMIX WALL</div>
  <p class="glow">Auto Updating EDM / Big Room Feed</p>
</div>

<div class="vinyl-container">
  <div class="vinyl"></div>
</div>

<div class="feed" id="feed"></div>

<script>

/* 🔥 YOUR DJs */
const DJs = [
  "denero808",
  "waltry",
  "ginsonic",
  "fattony",
  "karyo",
  "hayatmusic",
  "djn9ne",
  "exeatmusic",
  "juicyj",
  "mikis"
];

/* LOAD TRACKS */
async function loadTracks() {

  const container = document.getElementById("feed");
  container.innerHTML = ""; // refresh clean

  for (let dj of DJs) {

    let url = ⁠ https://api.rss2json.com/v1/api.json?rss_url=https://soundcloud.com/${dj}/tracks ⁠;

    try {
      let res = await fetch(url);
      let data = await res.json();

      data.items.slice(0, 2).forEach(track => {

        let div = document.createElement("div");
        div.className = "track";

        let embed = ⁠ https://w.soundcloud.com/player/?url=${track.link} ⁠;

        div.innerHTML = `
          <h3>${track.title}</h3>
          <iframe width="100%" height="166" src="${embed}"></iframe>
        `;

        container.appendChild(div);
      });

    } catch(e) {
      console.log("Error loading", dj);
    }
  }
}

loadTracks();

/* AUTO REFRESH */
setInterval(loadTracks, 120000);

</script>

</body>
</html>
