<!DOCTYPE html>
<html>
<head>
<title>DJ Nishal 🔥 Pro Remix Engine</title>

<style>
body {
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: gold;
}

.track {
  margin: 20px auto;
  width: 80%;
  padding: 10px;
  background: rgba(255,255,255,0.05);
  border-radius: 12px;
}

iframe {
  border-radius: 10px;
}
</style>
</head>

<body>

<h1>🔥 DJ NISHAL LIVE FEED</h1>
<p>Auto Updating Remix Feed (Big Room / EDM)</p>

<div id="feed"></div>

<script>

const DJs = [
  "denero808",
  "waltry",
  "ginsonic",
  "fattony",
  "karyo",
  "hayatmusic",
  "djn9ne",
  "exeatmusic",
  "juicyj",
  "mikis"
];

// 🔥 FETCH RSS FEED
async function loadFeed() {

  let container = document.getElementById("feed");

  for (let dj of DJs) {

    let url = ⁠ https://api.rss2json.com/v1/api.json?rss_url=https://soundcloud.com/${dj}/tracks ⁠;

    try {
      let res = await fetch(url);
      let data = await res.json();

      data.items.slice(0,2).forEach(track => {

        let div = document.createElement("div");
        div.className = "track";

        let embed = ⁠ https://w.soundcloud.com/player/?url=${track.link} ⁠;

        div.innerHTML = `
          <h3>${track.title}</h3>
          <iframe width="100%" height="166"
          src="${embed}"></iframe>
        `;

        container.appendChild(div);

      });

    } catch(e) {
      console.log("Error loading", dj);
    }

  }

}

loadFeed();

// 🔄 AUTO REFRESH EVERY 2 MIN
setInterval(loadFeed, 120000);

</script>

</body>
</html>
