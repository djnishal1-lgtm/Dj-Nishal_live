<!DOCTYPE html>
<html>
<head>
<title>DJ Nishal 🔥 Remix Wall</title>

<style>
body {
  background: #000;
  color: white;
  font-family: Arial;
  text-align: center;
}

h1 {
  color: gold;
  margin-top: 20px;
}

.feed {
  width: 90%;
  margin: auto;
}

.track {
  margin: 20px 0;
  background: rgba(255,255,255,0.05);
  padding: 15px;
  border-radius: 12px;
}
</style>
</head>

<body>

<h1>DJ NISHAL 🔥 LIVE REMIX WALL</h1>

<p>Latest EDM / Big Room / Remix Tracks</p>

<div class="feed" id="feed"></div>

<script>
function loadFeed() {

  let queries = [
    "big room remix",
    "edm remix 128 bpm",
    "festival mashup",
    "club remix extended",
    "afro house remix",
    "twerk remix clean"
  ];

  let html = "";

  queries.forEach(q => {
    html += `
      <div class="track">
        <h3>${q.toUpperCase()}</h3>

        <iframe width="100%" height="166"
          scrolling="no"
          frameborder="no"
          allow="autoplay"
          src="https://w.soundcloud.com/player/?url=https://soundcloud.com/search?q=${encodeURIComponent(q)}&color=%23ff5500">
        </iframe>

      </div>
    `;
  });

  document.getElementById("feed").innerHTML = html;
}

loadFeed();
</script>

</body>
</html>
